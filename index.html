<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>建筑节能技术刷题</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="题库控制">
        <div class="brand-block">
          <canvas id="coverArt" class="cover-art" width="640" height="260" aria-hidden="true"></canvas>
          <div class="brand-text">
            <p class="eyebrow">题库刷题</p>
            <h1 id="bankTitle">建筑节能技术</h1>
            <p id="sourceName" class="source-name">参考题库.docx</p>
          </div>
        </div>

        <div class="stats-strip" aria-label="题库统计">
          <div>
            <strong id="totalCount">0</strong>
            <span>总题</span>
          </div>
          <div>
            <strong id="doneCount">0</strong>
            <span>已做</span>
          </div>
          <div>
            <strong id="accuracyCount">0%</strong>
            <span>正确率</span>
          </div>
        </div>

        <div class="control-group">
          <label for="chapterSelect">章节</label>
          <select id="chapterSelect"></select>
        </div>

        <div class="control-group">
          <span class="field-label">题型</span>
          <div class="segmented" id="typeTabs" role="tablist" aria-label="题型">
            <button class="segment is-active" type="button" data-type="all">全部</button>
            <button class="segment" type="button" data-type="single">单选</button>
            <button class="segment" type="button" data-type="multiple">多选</button>
            <button class="segment" type="button" data-type="judge">判断</button>
          </div>
        </div>

        <div class="control-group">
          <label for="modeSelect">模式</label>
          <select id="modeSelect">
            <option value="sequence">顺序练习</option>
            <option value="random">随机练习</option>
            <option value="wrong">错题回顾</option>
            <option value="favorite">收藏题</option>
          </select>
        </div>

        <div class="control-group">
          <label for="searchInput">搜索</label>
          <input id="searchInput" type="search" placeholder="题干或选项" autocomplete="off" />
        </div>

        <div class="chapter-board" id="chapterBoard" aria-label="章节题量"></div>

        <button id="resetButton" class="ghost-button danger" type="button">
          <span aria-hidden="true">↻</span>
          <span>清空进度</span>
        </button>
      </aside>

      <main class="practice-area">
        <header class="topbar">
          <div class="current-labels">
            <span id="typeBadge" class="badge">单选题</span>
            <span id="chapterBadge" class="muted-label">第一章</span>
          </div>
          <div class="top-actions">
            <button id="favoriteButton" class="icon-button" type="button" aria-label="收藏本题" aria-pressed="false">
              <span aria-hidden="true">☆</span>
            </button>
          </div>
        </header>

        <section class="progress-panel" aria-label="练习进度">
          <div class="progress-copy">
            <span id="questionCounter">第 1 / 1 题</span>
            <strong id="scoreSummary">0 正确</strong>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div id="progressFill" class="progress-fill"></div>
          </div>
        </section>

        <section class="question-surface" aria-label="当前题目">
          <div id="emptyState" class="empty-state" hidden>
            <h2>暂无题目</h2>
            <p id="emptyText">当前筛选条件下没有题目。</p>
          </div>

          <div id="questionContent">
            <h2 id="questionStem" class="question-stem"></h2>
            <div id="optionsList" class="options-list"></div>

            <div id="answerPanel" class="answer-panel" hidden>
              <div>
                <span id="resultBadge" class="result-badge">正确</span>
                <strong>正确答案：<span id="correctAnswer"></span></strong>
              </div>
              <p id="userAnswerText"></p>
            </div>

            <div class="question-actions">
              <button id="prevButton" class="ghost-button" type="button">
                <span aria-hidden="true">←</span>
                <span>上一题</span>
              </button>
              <button id="submitButton" class="primary-button" type="button">
                <span aria-hidden="true">✓</span>
                <span>提交答案</span>
              </button>
              <button id="nextButton" class="primary-button secondary" type="button">
                <span>下一题</span>
                <span aria-hidden="true">→</span>
              </button>
            </div>
          </div>
        </section>

        <section class="map-panel" aria-label="题目导航">
          <div class="panel-heading">
            <h2>题目</h2>
            <span id="poolCount">0 题</span>
          </div>
          <div id="questionGrid" class="question-grid"></div>
        </section>
      </main>
    </div>

    <script src="questions.js"></script>
    <script src="app.js"></script>
  </body>
</html>
